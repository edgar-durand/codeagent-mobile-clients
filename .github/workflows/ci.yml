name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: CLI + VS Code plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: CLI typecheck
        working-directory: apps/cli
        run: npm run typecheck

      - name: CLI tests
        working-directory: apps/cli
        run: npm run test

      - name: CLI build
        working-directory: apps/cli
        run: npm run build

      - name: VS Code plugin build
        working-directory: apps/vsc-plugin
        run: npm run build

      - name: VS Code plugin package (.vsix)
        working-directory: apps/vsc-plugin
        run: npx @vscode/vsce package --no-dependencies

  jetbrains-plugin:
    name: JetBrains plugin — gradle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle build
        working-directory: apps/jetbrains-plugin
        run: ./gradlew buildPlugin
