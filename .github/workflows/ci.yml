name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 runtime for GitHub JavaScript actions — silences the
  # deprecation warning for actions/checkout@v4, actions/setup-node@v4 etc.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commitlint:
    name: Lint PR commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  node:
    name: CLI + VS Code plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: CLI typecheck
        working-directory: apps/cli
        run: npm run typecheck

      - name: CLI tests
        working-directory: apps/cli
        run: npm run test

      - name: CLI build
        working-directory: apps/cli
        run: npm run build

      - name: VS Code plugin build
        working-directory: apps/vsc-plugin
        run: npm run build

      - name: VS Code plugin package (.vsix)
        working-directory: apps/vsc-plugin
        run: npx @vscode/vsce package --no-dependencies

  jetbrains-plugin:
    name: JetBrains plugin — gradle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle build
        working-directory: apps/jetbrains-plugin
        run: ./gradlew buildPlugin
