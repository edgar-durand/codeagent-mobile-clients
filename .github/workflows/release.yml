name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Tag vX.Y.Z → publishes codeam-cli to npm, the VS Code extension to the VS
# Code Marketplace and Open VSX, and the JetBrains plugin to JetBrains
# Marketplace (stable channel). Drafts a GitHub Release with all three
# artifacts attached. Pre-release tags (vX.Y.Z-rc.N) skip the JetBrains
# marketplace push.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt into Node.js 24 runtime for GitHub JavaScript actions (silences the
  # deprecation warning from Node 20 default — will be removed 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build, publish, and draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Java (for JetBrains plugin archive build)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # --- Sync version across all package manifests -------------------------

      - name: Patch CLI version
        working-directory: apps/cli
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Patch VS Code plugin version
        working-directory: apps/vsc-plugin
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Patch JetBrains plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i -E "s/^version = \"[^\"]+\"/version = \"$VERSION\"/" apps/jetbrains-plugin/build.gradle.kts
          sed -i -E "s|<version>[^<]+</version>|<version>$VERSION</version>|" apps/jetbrains-plugin/src/main/resources/META-INF/plugin.xml

      # --- Install + typecheck + test ---------------------------------------

      - name: Install workspace dependencies
        run: npm ci

      - name: CLI typecheck
        working-directory: apps/cli
        run: npm run typecheck

      - name: CLI tests
        working-directory: apps/cli
        run: npm run test

      # --- Build + package --------------------------------------------------

      - name: Build CLI
        working-directory: apps/cli
        run: npm run build

      - name: Build VS Code plugin
        working-directory: apps/vsc-plugin
        run: npm run build

      - name: Package VS Code plugin (.vsix)
        working-directory: apps/vsc-plugin
        run: |
          npx @vscode/vsce package --no-dependencies --out "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"

      - name: Pack CLI tarball (for GitHub Release artifact)
        working-directory: apps/cli
        run: npm pack

      - name: Build JetBrains plugin
        working-directory: apps/jetbrains-plugin
        run: ./gradlew clean buildPlugin

      - name: Verify JetBrains plugin
        working-directory: apps/jetbrains-plugin
        run: ./gradlew verifyPlugin

      - name: Publish JetBrains plugin to Marketplace
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        working-directory: apps/jetbrains-plugin
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

      # --- Publish ----------------------------------------------------------

      - name: Publish CLI to npm
        working-directory: apps/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish VS Code plugin to Marketplace
        working-directory: apps/vsc-plugin
        run: |
          npx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT" \
            --packagePath "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish VS Code plugin to Open VSX
        working-directory: apps/vsc-plugin
        run: |
          npx ovsx publish --no-dependencies --pat "$OVSX_TOKEN" \
            "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      # --- GitHub Release ---------------------------------------------------

      - name: Locate JetBrains plugin archive
        id: jb
        run: |
          ZIP=$(ls apps/jetbrains-plugin/build/distributions/*.zip | head -n 1)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      # --- Auto-generate the changelog from conventional commits -------------

      - name: Generate release notes from commits (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Commit updated CHANGELOGs directly to main
        run: |
          set -euo pipefail

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "git-cliff produced no release notes (no conventional commits between tags). Nothing to commit."
            exit 0
          fi

          # The tag checkout has in-flight version bumps; drop them so we can
          # switch to main cleanly.
          git restore .
          git fetch origin main
          git checkout main

          for APP in cli vsc-plugin jetbrains-plugin; do
            FILE="apps/$APP/CHANGELOG.md"
            awk -v notes_file="RELEASE_NOTES.md" '
              BEGIN { inserted = 0 }
              /^## \[/ && !inserted {
                while ((getline line < notes_file) > 0) print line
                print ""
                inserted = 1
              }
              { print }
            ' "$FILE" > "$FILE.new"
            mv "$FILE.new" "$FILE"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/*/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing new to add to CHANGELOGs — maybe all commits between tags were skippable chores."
            exit 0
          fi
          git commit -m "chore(changelog): notes for v${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        # Run even if the changelog PR step failed — the registries already
        # received the release, so we always want the GitHub Release to exist
        # with the built artifacts attached.
        if: always() && steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          append_body: true
          files: |
            apps/cli/codeam-cli-${{ steps.version.outputs.version }}.tgz
            apps/vsc-plugin/codeagent-mobile-${{ steps.version.outputs.version }}.vsix
            ${{ steps.jb.outputs.zip }}
