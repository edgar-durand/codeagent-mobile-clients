name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Tag vX.Y.Z → publishes codeam-cli@X.Y.Z to npm and the VS Code extension
# X.Y.Z to the VS Code Marketplace and Open VSX, and drafts a GitHub Release
# with both artifacts attached. The JetBrains plugin is built here for
# archival attachment to the Release but is uploaded to the JetBrains
# Marketplace manually for now.

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish, and draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Java (for JetBrains plugin archive build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # --- Sync version across all package manifests -------------------------

      - name: Patch CLI version
        working-directory: apps/cli
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Patch VS Code plugin version
        working-directory: apps/vsc-plugin
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Patch JetBrains plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i -E "s/^version = \"[^\"]+\"/version = \"$VERSION\"/" apps/jetbrains-plugin/build.gradle.kts
          sed -i -E "s|<version>[^<]+</version>|<version>$VERSION</version>|" apps/jetbrains-plugin/src/main/resources/META-INF/plugin.xml

      # --- Install + typecheck + test ---------------------------------------

      - name: Install workspace dependencies
        run: npm ci

      - name: CLI typecheck
        working-directory: apps/cli
        run: npm run typecheck

      - name: CLI tests
        working-directory: apps/cli
        run: npm run test

      # --- Build + package --------------------------------------------------

      - name: Build CLI
        working-directory: apps/cli
        run: npm run build

      - name: Build VS Code plugin
        working-directory: apps/vsc-plugin
        run: npm run build

      - name: Package VS Code plugin (.vsix)
        working-directory: apps/vsc-plugin
        run: |
          npx @vscode/vsce package --no-dependencies --out "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"

      - name: Pack CLI tarball (for GitHub Release artifact)
        working-directory: apps/cli
        run: npm pack

      - name: Build JetBrains plugin (archive only)
        working-directory: apps/jetbrains-plugin
        run: ./gradlew clean buildPlugin

      # --- Publish ----------------------------------------------------------

      - name: Publish CLI to npm
        working-directory: apps/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish VS Code plugin to Marketplace
        working-directory: apps/vsc-plugin
        run: |
          npx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT" \
            --packagePath "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish VS Code plugin to Open VSX
        working-directory: apps/vsc-plugin
        run: |
          npx ovsx publish --no-dependencies --pat "$OVSX_TOKEN" \
            "codeagent-mobile-${{ steps.version.outputs.version }}.vsix"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      # --- GitHub Release ---------------------------------------------------

      - name: Locate JetBrains plugin archive
        id: jb
        run: |
          ZIP=$(ls apps/jetbrains-plugin/build/distributions/*.zip | head -n 1)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      # --- Auto-generate the changelog from conventional commits -------------

      - name: Generate release notes from commits (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Prepend release notes to each app's CHANGELOG.md
        id: changelog_prepend
        run: |
          set -euo pipefail

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "git-cliff produced no release notes (no conventional commits between tags). Skipping CHANGELOG PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Drop the in-flight version bumps so we can switch to main cleanly.
          git restore .
          git fetch origin main
          git checkout main

          for APP in cli vsc-plugin jetbrains-plugin; do
            FILE="apps/$APP/CHANGELOG.md"
            awk -v notes_file="RELEASE_NOTES.md" '
              BEGIN { inserted = 0 }
              /^## \[/ && !inserted {
                while ((getline line < notes_file) > 0) print line
                print ""
                inserted = 1
              }
              { print }
            ' "$FILE" > "$FILE.new"
            mv "$FILE.new" "$FILE"
          done

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Open PR with updated CHANGELOGs
        if: steps.changelog_prepend.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(changelog): notes for v${{ steps.version.outputs.version }}"
          title: "chore(changelog): notes for v${{ steps.version.outputs.version }}"
          body: |
            Auto-generated by the release workflow after publishing **v${{ steps.version.outputs.version }}** to npm, the VS Code Marketplace, and Open VSX.

            Prepends the git-cliff–generated release notes to each app's `CHANGELOG.md`.

            This PR is safe to merge — it only modifies changelog files.
          branch: chore/changelog-v${{ steps.version.outputs.version }}
          base: main
          delete-branch: true
          add-paths: |
            apps/*/CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          append_body: true
          files: |
            apps/cli/codeam-cli-${{ steps.version.outputs.version }}.tgz
            apps/vsc-plugin/codeagent-mobile-${{ steps.version.outputs.version }}.vsix
            ${{ steps.jb.outputs.zip }}
