version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - cli

  - package-ecosystem: npm
    directory: /apps/vsc-plugin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - vsc-plugin
    ignore:
      # VS Code 1.93 ships Node 20 as its embedded runtime; pin @types/node to
      # the matching major so we don't typecheck against APIs that don't exist
      # at runtime. Minor/patch updates within 20.x remain allowed.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: gradle
    directory: /apps/jetbrains-plugin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - jetbrains-plugin

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
